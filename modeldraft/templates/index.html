<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPE Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      padding: 30px 16px;
      color: #1a1a1a;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    header {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: white;
      padding: 28px 32px;
    }
    header h1 { font-size: 28px; margin-bottom: 4px; }
    header p { opacity: 0.9; font-size: 14px; }
    .main { padding: 28px 32px; }

    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8fafc;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #f97316;
      background: #fff7ed;
    }
    .drop-zone p { color: #64748b; margin-top: 8px; font-size: 14px; }
    .drop-zone .icon { font-size: 48px; }
    .drop-zone input[type="file"] { display: none; }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .conf-wrap { flex: 1; min-width: 240px; }
    .conf-wrap label { font-size: 13px; color: #475569; display: block; margin-bottom: 6px; }
    .conf-wrap input[type=range] { width: 100%; }
    .conf-val { font-weight: 600; color: #ea580c; }

    button {
      background: #ea580c;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #c2410c; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }

    .results { margin-top: 28px; display: none; }
    .results.show { display: block; }

    .result-image {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      margin-bottom: 20px;
    }

    .summary {
      background: #f1f5f9;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .summary h3 { margin-bottom: 10px; color: #0f172a; }
    .chip {
      display: inline-block;
      background: #10b981;
      color: white;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin: 4px 6px 0 0;
      font-weight: 500;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
    th { background: #f8fafc; color: #475569; font-weight: 600; }

    .loader {
      display: none;
      text-align: center;
      padding: 24px;
      color: #64748b;
    }
    .loader.show { display: block; }
    .spinner {
      border: 3px solid #e2e8f0;
      border-top-color: #ea580c;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🦺 PPE Detector</h1>
      <p>Upload an image to detect personal protective equipment with YOLOv8</p>
    </header>

    <div class="main">
      <label class="drop-zone" id="dropZone">
        <div class="icon">📤</div>
        <strong>Click or drag an image here</strong>
        <p>PNG, JPG, JPEG, WEBP · up to 16 MB</p>
        <input type="file" id="fileInput" accept="image/*" />
      </label>

      <div class="controls">
        <div class="conf-wrap">
          <label>Confidence threshold: <span class="conf-val" id="confVal">0.25</span></label>
          <input type="range" id="confSlider" min="0.05" max="0.95" step="0.05" value="0.25" />
        </div>
        <button id="detectBtn" disabled>Detect PPE</button>
      </div>

      <div class="error" id="errorBox"></div>

      <div class="loader" id="loader">
        <div class="spinner"></div>
        Running detection…
      </div>

      <div class="results" id="results">
        <img id="resultImg" class="result-image" alt="Detection result" />
        <div class="summary">
          <h3>Summary</h3>
          <div id="countChips"></div>
        </div>
        <table id="detTable">
          <thead>
            <tr><th>#</th><th>Label</th><th>Confidence</th><th>Box (x1, y1, x2, y2)</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const dropZone  = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const detectBtn = document.getElementById("detectBtn");
    const confSlider = document.getElementById("confSlider");
    const confVal   = document.getElementById("confVal");
    const loader    = document.getElementById("loader");
    const results   = document.getElementById("results");
    const resultImg = document.getElementById("resultImg");
    const countChips = document.getElementById("countChips");
    const tableBody = document.querySelector("#detTable tbody");
    const errorBox  = document.getElementById("errorBox");

    let selectedFile = null;

    confSlider.addEventListener("input", () => { confVal.textContent = confSlider.value; });

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault(); dropZone.classList.add("dragover");
    });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault(); dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", (e) => {
      if (e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      detectBtn.disabled = false;
      dropZone.querySelector("strong").textContent = file.name;
      hideError();
    }

    function showError(msg) { errorBox.textContent = msg; errorBox.classList.add("show"); }
    function hideError() { errorBox.classList.remove("show"); }

    detectBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      hideError();
      results.classList.remove("show");
      loader.classList.add("show");
      detectBtn.disabled = true;

      const form = new FormData();
      form.append("image", selectedFile);
      form.append("conf", confSlider.value);

      try {
        const res = await fetch("/predict", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");
        renderResults(data);
      } catch (err) {
        showError(err.message);
      } finally {
        loader.classList.remove("show");
        detectBtn.disabled = false;
      }
    });

    function renderResults(data) {
      resultImg.src = data.result_image_url + "?t=" + Date.now();

      countChips.innerHTML = "";
      if (data.total === 0) {
        countChips.innerHTML = '<span class="chip" style="background:#64748b;">No objects detected</span>';
      } else {
        for (const [label, count] of Object.entries(data.counts)) {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = `${label}: ${count}`;
          countChips.appendChild(chip);
        }
      }

      tableBody.innerHTML = "";
      data.detections.forEach((d, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${d.label}</td>
          <td>${(d.confidence * 100).toFixed(1)}%</td>
          <td>${d.bbox.join(", ")}</td>`;
        tableBody.appendChild(tr);
      });

      results.classList.add("show");
    }
  </script>
</body>
</html>
